name: gamerz_bank
description: Gamerz Bank - One Wallet. Endless Wins.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.2.0

  # HTTP Client
  dio: ^5.4.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  firebase_messaging: ^14.7.15

  # Local Storage
  shared_preferences: ^2.2.2

  # UI
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  pin_code_fields: ^8.0.1
  country_code_picker: ^3.0.0
  carousel_slider: ^4.2.1
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.4
  firebase_analytics: ^10.10.7
  firebase_crashlytics: ^3.5.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/  